- id: bigdata-trino-claim-0006
  domain: bigdata
  component: trino
  statement: >-
    Trino performance depends heavily on how much work can be pushed into the underlying data source, and pushdown
    support is specific to each connector and source combination.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-pushdown-docs
  notes: Pushdown boundary claim.
- id: bigdata-trino-claim-0007
  domain: bigdata
  component: trino
  statement: >-
    If predicate pushdown succeeds, the explain plan no longer shows a ScanFilterProject for that predicate, and if
    projection pushdown succeeds the TableScan layout shows only relevant columns.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-pushdown-docs
  notes: Explain-based pushdown evidence claim.
- id: bigdata-trino-claim-0008
  domain: bigdata
  component: trino
  statement: >-
    Join pushdown requires connector support and only applies when the join predicates can be pushed down and the joined
    tables come from the same catalog.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-pushdown-docs
  notes: Join pushdown boundary claim.
- id: bigdata-trino-claim-0009
  domain: bigdata
  component: trino
  statement: >-
    Cost-based join reordering and join distribution decisions rely on table statistics supplied by connectors, and when
    statistics are missing Trino falls back to less informed strategies.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-cost-based-optimizations-docs
  notes: Statistics and optimizer dependency claim.
- id: bigdata-trino-claim-0010
  domain: bigdata
  component: trino
  statement: >-
    Broadcast joins are faster when the build side is much smaller, but require the build side to fit in memory on each
    node; partitioned joins redistribute both sides and scale to larger joins.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-cost-based-optimizations-docs
  notes: Join distribution tradeoff claim.
- id: bigdata-trino-claim-0011
  domain: bigdata
  component: trino
  statement: >-
    The size of broadcast joins can be capped with join-max-broadcast-table-size to protect cluster concurrency and
    reduce the impact of optimizer misestimation.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-cost-based-optimizations-docs
  notes: Broadcast cap governance claim.
- id: bigdata-trino-claim-0012
  domain: bigdata
  component: trino
  statement: >-
    A resource group places limits on memory, queued queries and concurrency, and when a group runs out of a governed
    resource new queries are queued rather than causing running queries to fail.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-resource-groups-docs
