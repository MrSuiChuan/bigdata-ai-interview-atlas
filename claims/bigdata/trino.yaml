- id: bigdata-trino-claim-0013
  domain: bigdata
  component: trino
  statement: >-
    Selectors assign each query to exactly one resource group based on attributes such as user, source, authenticated
    user, original user or tags, making resource governance a routing problem as well as a quota problem.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-resource-groups-docs
