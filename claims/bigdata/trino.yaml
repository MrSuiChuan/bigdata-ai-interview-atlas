- id: bigdata-trino-claim-0001
  domain: bigdata
  component: trino
  statement: >-
    Trino is a distributed SQL query engine for querying data from multiple sources through catalogs and connectors; it
    should be explained as a query engine rather than as a storage system.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-docs
