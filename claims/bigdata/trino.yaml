- id: bigdata-trino-claim-0002
  domain: bigdata
  component: trino
  statement: >-
    The coordinator is responsible for query parsing, semantic analysis, planning and scheduling, while workers execute
    tasks and exchange intermediate data.
  status: reviewed
  confidence: high
  version_scope: Official Trino current docs as verified on 2026-05-11
  last_verified_at: '2026-05-11'
  source_ids:
    - trino-architecture-docs
  notes: Coordinator and worker role boundary claim.
- id: bigdata-trino-claim-0003
  domain: bigdata
  component: trino
  statement: >-
    A catalog is a named configuration that points Trino at a specific connector and its connection properties, so
