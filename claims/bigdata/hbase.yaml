  domain: bigdata
  component: hbase
  statement: >-
    Evidence-driven HBase tuning starts by identifying whether the bottleneck is hotspotting, metadata or routing churn, WAL durability cost, flush pressure, compaction debt, storage amplification or an application access-pattern mistake before changing configuration values.
  status: reviewed
