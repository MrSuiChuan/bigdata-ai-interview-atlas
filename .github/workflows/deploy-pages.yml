name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL }}
      DOCS_SITE_BASE_URL: ${{ vars.DOCS_SITE_BASE_URL }}
      DOCS_SITE_OWNER: ${{ vars.DOCS_SITE_OWNER }}
      DOCS_SITE_REPO: ${{ vars.DOCS_SITE_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/docs-site/package-lock.json

      - name: Validate markdown content
        run: |
          npm ci
          npm run validate

      - name: Install docs site dependencies
        working-directory: web/docs-site
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        working-directory: web/docs-site
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
